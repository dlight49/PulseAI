services:
  # The Pulse AI All-in-One Executive Engine
  # This runs on Render's FREE tier (No credit card needed)
  - type: web
    name: pulse-ai-engine
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.webhook_v2:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: ADMIN_API_KEY
        sync: false
      - key: META_VERIFY_TOKEN
        sync: false
